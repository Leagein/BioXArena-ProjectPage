<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Paper figure placeholder</title>
  <desc id="desc">A neutral scientific figure placeholder for replacing with paper illustrations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#eef5ef"/>
      <stop offset="52%" stop-color="#f8f4e8"/>
      <stop offset="100%" stop-color="#e7f0ee"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#cfd8d2" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.55"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M240 430 C350 250 470 520 590 338 S820 190 960 320" stroke="#0f766e" stroke-width="18"/>
    <path d="M265 260 H470 M265 320 H390 M730 430 H935 M810 490 H935" stroke="#b45f3c" stroke-width="14"/>
    <rect x="210" y="170" width="220" height="320" rx="26" stroke="#17211b" stroke-width="10" opacity="0.72"/>
    <rect x="770" y="170" width="220" height="320" rx="26" stroke="#17211b" stroke-width="10" opacity="0.72"/>
    <circle cx="600" cy="338" r="92" stroke="#d8a62d" stroke-width="14"/>
  </g>
  <g fill="#17211b" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="600" y="590" font-size="38" font-weight="700">Replace with paper figure</text>
    <text x="600" y="632" font-size="22" fill="#5f6963">assets/figure-placeholder.svg</text>
  </g>
</svg>
